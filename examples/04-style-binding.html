<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Koolic — 04 Style Binding</title>
    <script src="../js/koolic.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2em auto; padding: 0 1em; }
        #swatch { width: 100%; height: 120px; border-radius: 6px; border: 1px solid #ccc; margin-top: 1em; }
        input { padding: 6px 10px; font-size: 1em; width: 200px; }
    </style>
</head>
<body>
    <h1>04 — Style binding</h1>
    <p>Type a CSS color (e.g. <code>tomato</code>, <code>#9cf</code>). The swatch updates live.</p>

    <input id="color" value="cornflowerblue" />
    <div id="swatch"></div>

    <script>
        const style = { color: 'cornflowerblue' };

        $$('#color').bind($$(style).color);                        // two-way input <-> color
        $$('#swatch').bind($$(style).color, 'style.backgroundColor');
    </script>
</body>
</html>
